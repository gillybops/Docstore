# ══════════════════════════════════════════════════════════════
# DocStore API — Application Configuration
# ══════════════════════════════════════════════════════════════

# ── Server ────────────────────────────────────────────────────
# Elastic Beanstalk expects port 5000 by default for Java apps.
# This can be overridden via the PORT environment variable on EB.
server.port=${PORT:5000}

# ── MongoDB / AWS DocumentDB Connection ───────────────────────
# For LOCAL development, point to a local MongoDB instance:
#   spring.data.mongodb.uri=mongodb://localhost:27017/docstore
#
# For AWS DocumentDB (PRODUCTION), use the full TLS URI below.
# The URI is injected via an environment variable set in the
# Elastic Beanstalk console — NEVER hardcode credentials here.
#
# DocumentDB requires:
#   - tls=true                          (DocumentDB enforces TLS)
#   - tlsCAFile=<path to AWS CA cert>   (cert bundled in Dockerfile or EB config)
#   - replicaSet=rs0                    (DocumentDB uses replica set mode)
#   - retryWrites=false                 (DocumentDB does not support retryWrites)
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/docstore}

# Database name — used when the URI does not specify one explicitly
spring.data.mongodb.database=docstore

# ── Logging ───────────────────────────────────────────────────
# Set MongoDB driver to DEBUG during development to see all queries.
# Change to INFO or WARN before production deployment.
logging.level.org.springframework.data.mongodb=DEBUG
logging.level.com.demo.docstore=DEBUG

# ── SpringDoc / Swagger UI ────────────────────────────────────
# Swagger UI will be available at: http://localhost:5000/swagger-ui.html
# OpenAPI JSON spec at:           http://localhost:5000/v3/api-docs
#
# Unlike FastAPI which auto-generates docs with no config,
# Spring Boot needs the springdoc dependency (in pom.xml) + these two lines.
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── CORS ──────────────────────────────────────────────────────
# Configured in CorsConfig.java — see that file for allowed origins.
# Kept out of properties so it can be managed with type safety.
